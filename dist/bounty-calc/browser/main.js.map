<mat-card class="perk-card">
  <mat-card-header>
    <div mat-card-avatar class="icon"><mat-icon>{{ icon }}</mat-icon></div>
    <mat-card-title>{{ title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="percent">{{ getPercentLabel() }}</div>
  </mat-card-content>
  <mat-card-actions>
    <button mat-mini-fab color="primary" (click)="dec()"><mat-icon>remove</mat-icon></button>
    <button mat-mini-fab color="primary" (click)="inc()"><mat-icon>add</mat-icon></button>
  </mat-card-actions>
</mat-card>
